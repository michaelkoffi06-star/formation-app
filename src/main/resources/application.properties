# Connexion MySQL (compatible Railway)
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:mysql://192.168.122.240:3306/formation_db?useSSL=false&allowPublicKeyRetrieval=true}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:formation_user}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:formation123}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQL8Dialect

# Thymeleaf
spring.thymeleaf.cache=true

# Upload fichiers
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

# Port
server.port=${PORT:8081}