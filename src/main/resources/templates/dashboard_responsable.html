<!DOCTYPE html>
<html lang="fr" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Dashboard Responsable Formation</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: Arial, sans-serif; background: #f4f6f8; }

        header {
            background: #1a237e;
            color: white;
            padding: 16px 32px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        header h1 { font-size: 1.4rem; }
        header a { color: #90caf9; text-decoration: none; font-size: 0.9rem; }

        .container { max-width: 900px; margin: 40px auto; padding: 0 20px; }

        h2 { color: #1a237e; margin-bottom: 24px; }

        .stats {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 16px;
            margin-bottom: 36px;
        }
        .card {
            background: white;
            border-radius: 8px;
            padding: 24px 16px;
            text-align: center;
            box-shadow: 0 2px 6px rgba(0,0,0,0.08);
        }
        .card .chiffre { font-size: 2.2rem; font-weight: bold; }
        .card .label   { font-size: 0.85rem; color: #666; margin-top: 6px; }

        .card.total     .chiffre { color: #1a237e; }
        .card.attente   .chiffre { color: #f57c00; }
        .card.acceptee  .chiffre { color: #2e7d32; }
        .card.refusee   .chiffre { color: #c62828; }

        .actions {
            display: flex;
            gap: 12px;
        }
        .btn {
            display: inline-block;
            padding: 12px 24px;
            border-radius: 6px;
            text-decoration: none;
            font-weight: bold;
            font-size: 0.95rem;
        }
        .btn-primary { background: #1a237e; color: white; }
        .btn-primary:hover { background: #283593; }
    </style>
</head>
<body>

<header>
    <h1>Formation Espace Responsable</h1>
    <a href="/logout">Se déconnecter</a>
</header>

<div class="container">
    <h2>Tableau de bord</h2>

    <div class="stats">
        <div class="card total">
            <div class="chiffre" th:text="${total}">0</div>
            <div class="label">Total demandes</div>
        </div>
        <div class="card attente">
            <div class="chiffre" th:text="${enAttente}">0</div>
            <div class="label">En attente</div>
        </div>
        <div class="card acceptee">
            <div class="chiffre" th:text="${acceptees}">0</div>
            <div class="label">Acceptées</div>
        </div>
        <div class="card refusee">
            <div class="chiffre" th:text="${refusees}">0</div>
            <div class="label">Refusées</div>
        </div>
    </div>

    <div class="actions">
        <a href="/responsable/demandes" class="btn btn-primary">📋 Gérer les demandes</a>
        <a href="/responsable/admin" class="btn btn-primary" style="background:#283593;">⚙️ Administration</a>
    </div>
</div>

</body>
</html>
