<!DOCTYPE html>
<html lang="fr" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Administration — FormaPro</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: Arial, sans-serif; background: #f4f6f8; }
        header { background: #1a237e; color: white; padding: 16px 32px; display: flex; justify-content: space-between; align-items: center; }
        header h1 { font-size: 1.4rem; }
        header a { color: #90caf9; text-decoration: none; font-size: 0.9rem; }
        .container { max-width: 1100px; margin: 32px auto; padding: 0 20px; display: flex; flex-direction: column; gap: 32px; }
        .nav-tabs { display: flex; gap: 8px; margin-bottom: 0; }
        .tab-btn { padding: 10px 20px; background: #e3e8f0; border: none; border-radius: 6px 6px 0 0; cursor: pointer; font-size: 0.9rem; font-weight: bold; color: #1a237e; }
        .tab-btn.active { background: white; border-bottom: 2px solid white; }
        .tab-content { display: none; background: white; border-radius: 0 8px 8px 8px; padding: 24px; box-shadow: 0 2px 6px rgba(0,0,0,0.08); }
        .tab-content.active { display: block; }
        h2 { color: #1a237e; font-size: 1.1rem; margin-bottom: 16px; }
        table { width: 100%; border-collapse: collapse; }
        thead { background: #1a237e; color: white; }
        th, td { padding: 12px 14px; text-align: left; font-size: 0.88rem; }
        tr:not(:last-child) td { border-bottom: 1px solid #eee; }
        tr:hover td { background: #f9f9ff; }
        .btn { border: none; padding: 6px 14px; border-radius: 5px; cursor: pointer; font-size: 0.82rem; font-weight: bold; text-decoration: none; display: inline-block; }
        .btn-danger  { background: #c62828; color: white; }
        .btn-danger:hover { background: #d32f2f; }
        .form-inline { display: flex; gap: 10px; flex-wrap: wrap; align-items: flex-end; margin-bottom: 20px; padding: 16px; background: #f0f4f8; border-radius: 8px; }
        .form-inline label { font-size: 0.82rem; color: #555; display: flex; flex-direction: column; gap: 4px; font-weight: bold; }
        .form-inline input, .form-inline select { padding: 8px 12px; border: 1px solid #ddd; border-radius: 6px; font-size: 0.88rem; width: 180px; }
        .form-inline button { padding: 9px 20px; background: #1a237e; color: white; border: none; border-radius: 6px; cursor: pointer; font-weight: bold; }
        .form-inline button:hover { background: #283593; }
        .badge { padding: 3px 10px; border-radius: 20px; font-size: 0.78rem; font-weight: bold; }
        .badge.EMPLOYE { background: #e8eaf6; color: #1a237e; }
        .badge.RESPONSABLE { background: #fce4ec; color: #880e4f; }
        .alert { padding: 10px 16px; border-radius: 6px; margin-bottom: 16px; font-size: 0.9rem; }
        .alert-success { background: #D4EDDA; color: #155724; }
        .alert-error { background: #F8D7DA; color: #721c24; }
    </style>
</head>
<body>

<header>
    <h1>FormaPro — Administration</h1>
    <div style="display:flex;gap:20px;align-items:center;">
        <a href="/responsable/dashboard">← Dashboard</a>
        <a href="/logout">Se déconnecter</a>
    </div>
</header>

<div class="container">

    <div th:if="${succes}" class="alert alert-success" th:text="${succes}"></div>
    <div th:if="${erreur}" class="alert alert-error" th:text="${erreur}"></div>

    <!-- ONGLETS -->
    <div>
        <div class="nav-tabs">
            <button class="tab-btn active" onclick="showTab('comptes')">👥 Comptes employés</button>
            <button class="tab-btn" onclick="showTab('formations')">📚 Formations</button>
        </div>

        <!-- ONGLET COMPTES -->
        <div id="tab-comptes" class="tab-content active">
            <h2>Ajouter un employé</h2>
            <form class="form-inline" action="/responsable/admin/employes/ajouter" method="post">
                <label>Nom
                    <input type="text" name="nom" placeholder="Nom complet" required>
                </label>
                <label>Email
                    <input type="email" name="email" placeholder="email@entreprise.com" required>
                </label>
                <label>Mot de passe
                    <input type="password" name="motDePasse" placeholder="••••••••" required>
                </label>
                <label>Rôle
                    <select name="role">
                        <option value="EMPLOYE">Employé</option>
                        <option value="RESPONSABLE">Responsable</option>
                    </select>
                </label>
                <button type="submit">+ Ajouter</button>
            </form>

            <h2>Liste des comptes</h2>
            <table>
                <thead>
                    <tr><th>ID</th><th>Nom</th><th>Email</th><th>Rôle</th><th>Action</th></tr>
                </thead>
                <tbody>
                    <tr th:each="emp : ${employes}">
                        <td th:text="${emp.id}">1</td>
                        <td th:text="${emp.nom}">Nom</td>
                        <td th:text="${emp.email}">email</td>
                        <td><span class="badge" th:classappend="${emp.role.name()}" th:text="${emp.role.name()}">EMPLOYE</span></td>
                        <td>
                            <form th:action="@{/responsable/admin/employes/supprimer/{id}(id=${emp.id})}" method="post"
                                  onsubmit="return confirm('Supprimer ce compte ?');">
                                <button class="btn btn-danger" type="submit">🗑 Supprimer</button>
                            </form>
                        </td>
                    </tr>
                </tbody>
            </table>
        </div>

        <!-- ONGLET FORMATIONS -->
        <div id="tab-formations" class="tab-content">
            <h2>Ajouter une formation</h2>
            <form class="form-inline" action="/responsable/admin/formations/ajouter" method="post">
                <label>Titre
                    <input type="text" name="titre" placeholder="Titre de la formation" required>
                </label>
                <label>Description
                    <input type="text" name="description" placeholder="Description courte">
                </label>
                <label>Durée (jours)
                    <input type="number" name="dureeJours" placeholder="5" min="1" required>
                </label>
                <button type="submit">+ Ajouter</button>
            </form>

            <h2>Liste des formations</h2>
            <table>
                <thead>
                    <tr><th>ID</th><th>Titre</th><th>Description</th><th>Durée</th><th>Action</th></tr>
                </thead>
                <tbody>
                    <tr th:each="f : ${formations}">
                        <td th:text="${f.id}">1</td>
                        <td th:text="${f.titre}">Titre</td>
                        <td th:text="${f.description != null ? f.description : '—'}">—</td>
                        <td th:text="${f.dureeJours + ' jours'}">5 jours</td>
                        <td>
                            <form th:action="@{/responsable/admin/formations/supprimer/{id}(id=${f.id})}" method="post"
                                  onsubmit="return confirm('Supprimer cette formation ?');">
                                <button class="btn btn-danger" type="submit">🗑 Supprimer</button>
                            </form>
                        </td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>
</div>

<script>
function showTab(name) {
    document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
    document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
    document.getElementById('tab-' + name).classList.add('active');
    event.target.classList.add('active');
}
</script>
</body>
</html>
