# ================================================================
# CONFIGURATION LOCALE (développement)
# Pour la production, ces valeurs sont remplacées par des
# variables d'environnement définies sur Railway
# ================================================================

# Connexion MariaDB
# En production : Railway injecte automatiquement DATABASE_URL
spring.datasource.url=${DATABASE_URL:jdbc:mariadb://192.168.122.240:3306/formation_db}
spring.datasource.username=${DATABASE_USERNAME:formation_user}
spring.datasource.password=${DATABASE_PASSWORD:formation123}
spring.datasource.driver-class-name=org.mariadb.jdbc.Driver

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MariaDBDialect

# Thymeleaf
spring.thymeleaf.cache=true

# Upload fichiers
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

# Port (Railway injecte la variable PORT automatiquement)
server.port=${PORT:8081}
